<!DOCTYPE html><html lang="ru"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Админка КЛЕВЕР</title>
<style>*{box-sizing:border-box}body{margin:0;font-family:Arial,sans-serif;background:#f6f3ee;color:#35543d}.wrap{max-width:1100px;margin:auto;padding:24px}.panel{background:#fff;border-radius:20px;padding:22px;box-shadow:0 8px 28px #0000000f;margin-bottom:20px}h1,h2{margin-top:0}.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px}label{display:grid;gap:6px;font-weight:600}input,textarea,select{width:100%;padding:12px;border:1px solid #ddd;border-radius:10px;font:inherit}textarea{min-height:100px}button{border:0;border-radius:10px;padding:12px 18px;background:#35543d;color:#fff;cursor:pointer;font-weight:700}.secondary{background:#d8a8b5}.danger{background:#b84d57}.muted{color:#6c7a70}.actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:16px}.product{display:grid;grid-template-columns:100px 1fr auto;gap:16px;align-items:center;padding:14px 0;border-bottom:1px solid #eee}.product img{width:100px;height:100px;object-fit:cover;border-radius:14px;background:#eee}.login{max-width:420px;margin:80px auto}.hidden{display:none!important}.status{margin-top:12px;font-weight:700}.order{padding:14px 0;border-bottom:1px solid #eee}@media(max-width:700px){.grid{grid-template-columns:1fr}.product{grid-template-columns:72px 1fr}.product img{width:72px;height:72px}.product .actions{grid-column:1/-1}}</style></head><body>
<div class="wrap"><section id="login" class="panel login"><h1>Вход в админку</h1><label>Логин<input id="login-user" value="admin"></label><label>Пароль<input id="login-password" type="password"></label><button onclick="login()">Войти</button><div id="login-status" class="status"></div></section>
<main id="admin" class="hidden"><div class="panel"><div style="display:flex;justify-content:space-between;align-items:center"><h1>Админка КЛЕВЕР</h1><button class="secondary" onclick="logout()">Выйти</button></div><p class="muted">Изменения сразу появляются на сайте.</p></div>
<section class="panel"><h2 id="form-title">Добавить товар</h2><input id="product-id" type="hidden"><div class="grid"><label>Название<input id="name"></label><label>Цена, ₽<input id="price" type="number" min="1"></label><label>Категория<input id="category" value="Букеты"></label><label>Порядок<input id="sort-order" type="number" value="0"></label><label>Фото с компьютера<input id="image-file" type="file" accept="image/*"></label><label>Или ссылка на фото<input id="image"></label></div><label>Описание<textarea id="description"></textarea></label><label style="display:flex;grid-template-columns:auto 1fr;align-items:center;margin-top:12px"><input id="visible" type="checkbox" checked style="width:auto"> Показывать товар на сайте</label><div class="actions"><button onclick="saveProduct()">Сохранить товар</button><button class="secondary" onclick="resetForm()">Очистить форму</button></div><div id="form-status" class="status"></div></section>
<section class="panel"><h2>Товары</h2><div id="products"></div></section><section class="panel"><h2>Заказы</h2><div id="orders"></div></section></main></div>
<script>
let products=[];async function request(u,o={}){const r=await fetch(u,o),d=await r.json().catch(()=>({}));if(!r.ok)throw Error(d.error||"Ошибка");return d}
async function checkAuth(){const m=await request("/api/me");login.classList.toggle("hidden",m.isAdmin);admin.classList.toggle("hidden",!m.isAdmin);if(m.isAdmin){loadProducts();loadOrders()}}
async function login(){try{await request("/api/login",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({username:document.getElementById("login-user").value,password:document.getElementById("login-password").value})});checkAuth()}catch(e){document.getElementById("login-status").textContent=e.message}}
async function logout(){await request("/api/logout",{method:"POST"});location.reload()}
async function loadProducts(){products=await request("/api/admin/products");document.getElementById("products").innerHTML=products.length?products.map(p=>`<div class="product"><img src="${p.image||''}" alt=""><div><strong>${p.name}</strong><div>${Number(p.price).toLocaleString("ru-RU")} ₽ · ${p.category}</div><small>${p.visible?"Показывается":"Скрыт"}</small></div><div class="actions"><button onclick="editProduct(${p.id})">Изменить</button><button class="danger" onclick="deleteProduct(${p.id})">Удалить</button></div></div>`).join(""):"<p>Товаров пока нет.</p>"}
function editProduct(id){const p=products.find(x=>x.id===id);if(!p)return;document.getElementById("product-id").value=p.id;name.value=p.name;price.value=p.price;category.value=p.category||"Букеты";document.getElementById("sort-order").value=p.sort_order||0;image.value=p.image||"";description.value=p.description||"";visible.checked=Boolean(p.visible);document.getElementById("form-title").textContent="Редактировать товар";scrollTo({top:0,behavior:"smooth"})}
function resetForm(){document.getElementById("product-id").value="";name.value="";price.value="";category.value="Букеты";document.getElementById("sort-order").value=0;image.value="";document.getElementById("image-file").value="";description.value="";visible.checked=true;document.getElementById("form-title").textContent="Добавить товар"}
async function uploadImage(){const f=document.getElementById("image-file").files[0];if(!f)return image.value.trim();const fd=new FormData();fd.append("image",f);return (await request("/api/admin/upload",{method:"POST",body:fd})).url}
async function saveProduct(){const s=document.getElementById("form-status");try{s.textContent="Сохраняем…";const id=document.getElementById("product-id").value,img=await uploadImage(),payload={name:name.value.trim(),price:Number(price.value),category:category.value.trim(),sort_order:Number(document.getElementById("sort-order").value),image:img,description:description.value.trim(),visible:visible.checked};await request(id?`/api/admin/products/${id}`:"/api/admin/products",{method:id?"PUT":"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(payload)});s.textContent="Сохранено";resetForm();loadProducts()}catch(e){s.textContent=e.message}}
async function deleteProduct(id){if(!confirm("Удалить товар?"))return;await request(`/api/admin/products/${id}`,{method:"DELETE"});loadProducts()}
async function loadOrders(){const a=await request("/api/admin/orders");document.getElementById("orders").innerHTML=a.length?a.map(o=>`<div class="order"><strong>Заказ №${o.id} · ${o.customer_name}</strong><div>${o.phone} · ${Number(o.total).toLocaleString("ru-RU")} ₽</div><div>${o.items.map(i=>`${i.name} × ${i.qty}`).join(", ")}</div><select onchange="changeStatus(${o.id},this.value)">${["Новый","Принят","Готов","Доставлен","Отменён"].map(s=>`<option ${s===o.status?"selected":""}>${s}</option>`).join("")}</select></div>`).join(""):"<p>Заказов пока нет.</p>"}
async function changeStatus(id,status){await request(`/api/admin/orders/${id}/status`,{method:"PUT",headers:{"Content-Type":"application/json"},body:JSON.stringify({status})})}
checkAuth();
</script></body></html>
