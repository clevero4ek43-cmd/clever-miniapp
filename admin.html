
<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Админка КЛЕВЕР</title>

<style>
body{
font-family:Arial,sans-serif;
background:#f6f3ee;
max-width:900px;
margin:40px auto;
padding:20px;
}

h1{
color:#35543d;
}

input,textarea{
width:100%;
padding:12px;
margin:8px 0 18px;
border:1px solid #ccc;
border-radius:8px;
box-sizing:border-box;
font-size:16px;
}

button{
background:#35543d;
color:white;
border:none;
padding:12px 22px;
border-radius:8px;
cursor:pointer;
font-size:16px;
}

button:hover{
background:#27442f;
}

.card{
background:white;
padding:15px;
margin-top:15px;
border-radius:12px;
box-shadow:0 2px 8px rgba(0,0,0,.08);
}

.delete{
background:#c0392b;
margin-top:10px;
}

img{
max-width:160px;
border-radius:10px;
margin-top:10px;
}
</style>
</head>

<body>

<h1>Админка КЛЕВЕР</h1>

<p>Название</p>
<input id="name">

<p>Цена</p>
<input id="price">

<p>Фото (ссылка)</p>
<input id="image">

<p>Описание</p>
<textarea id="description"></textarea>

<button onclick="saveProduct()">
Добавить товар
</button>

<h2>Товары</h2>

<div id="list"></div>

<script>
async function loadProducts(){

const res = await fetch("/api/products");
const products = await res.json();
const list = document.getElementById("list");

list.innerHTML = "";

products.forEach(p => {

list.innerHTML += `
<div class="card">

<h3>${p.name || "Без названия"}</h3>

<p><b>${p.price || 0} ₽</b></p>

${p.image ? `<img src="${p.image}">` : ""}

<p>${p.description || ""}</p>

<button
class="delete"
onclick="deleteProduct(${p.id})">
Удалить
</button>

</div>
`;

});

}

async function saveProduct(){

const product = {
name: document.getElementById("name").value,
price: document.getElementById("price").value,
image: document.getElementById("image").value,
description: document.getElementById("description").value
};

await fetch("/api/products",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify(product)
});

document.getElementById("name").value = "";
document.getElementById("price").value = "";
document.getElementById("image").value = "";
document.getElementById("description").value = "";

loadProducts();

}

async function deleteProduct(id){

await fetch("/api/products/" + id,{
method:"DELETE"
});

loadProducts();

}

loadProducts();
</script>

</body>
</html>
